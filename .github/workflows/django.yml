name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.10, 3.11, 3.12]  # Updated to match Django 5.1.3+ requirements

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create Static Directory
      run: |
        mkdir -p static
        mkdir -p media
    
    - name: Run Migrations
      env:
        DJANGO_SETTINGS_MODULE: IT_project.settings
        SECRET_KEY: 'dummy_key_for_tests'
        DEBUG: 'False'
        SITE_ID: '1'  # Required for django-allauth
      run: |
        python manage.py makemigrations wandercritic
        python manage.py migrate
        
    - name: Collect Static
      env:
        DJANGO_SETTINGS_MODULE: IT_project.settings
        SECRET_KEY: 'dummy_key_for_tests'
        DEBUG: 'False'
        SITE_ID: '1'
      run: |
        python manage.py collectstatic --noinput
        
    - name: Run Tests
      env:
        DJANGO_SETTINGS_MODULE: IT_project.settings
        SECRET_KEY: 'dummy_key_for_tests'
        DEBUG: 'False'
        SITE_ID: '1'
        ACCOUNT_EMAIL_VERIFICATION: 'none'  # Match your settings
      run: |
        python manage.py test
